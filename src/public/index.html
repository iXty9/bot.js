<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Discord Bot Manager - A web interface for managing Discord bots">
    <meta name="theme-color" content="hsl(var(--background))">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https:; connect-src 'self' https://discord.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;">
    <title>Discord Bot Manager</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/styles.css" rel="stylesheet">
    <style>
      :root {
        --background: 220 7.7% 7.5%;
        --foreground: 0 0% 100%;
        --card: 220 7.7% 11%;
        --card-foreground: 0 0% 100%;
        --popover: 220 7.7% 11%;
        --popover-foreground: 0 0% 100%;
        --primary: 235 85.6% 64.7%;
        --primary-foreground: 0 0% 100%;
        --secondary: 217.2 32.6% 17.5%;
        --secondary-foreground: 210 40% 98%;
        --muted: 217.2 32.6% 17.5%;
        --muted-foreground: 215 20.2% 65.1%;
        --accent: 217.2 32.6% 17.5%;
        --accent-foreground: 210 40% 98%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 210 40% 98%;
        --border: 217.2 32.6% 17.5%;
        --input: 217.2 32.6% 17.5%;
        --ring: 235 85.6% 64.7%;
        --radius: 0.5rem;
      }
        
        html {
            scroll-behavior: smooth;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        body {
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            font-family: 'gg sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        *:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px hsl(var(--background)), 0 0 0 4px hsl(var(--primary));
        }
        textarea {
            resize: vertical;
            min-height: 120px;
            background-color: hsl(var(--secondary));
            color: hsl(var(--secondary-foreground));
            border: 1px solid hsl(var(--border));
            border-radius: 0.375rem;
            padding: 0.75rem;
            width: 100%;
            margin-bottom: 1rem;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.5;
            transition: all 0.15s ease;
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: hsl(var(--secondary)) transparent;
        }
        *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        *::-webkit-scrollbar-track {
            background: transparent;
        }
        *::-webkit-scrollbar-thumb {
            background-color: hsl(var(--secondary));
            border-radius: 4px;
        }
        *::-webkit-scrollbar-thumb:hover {
            background-color: hsl(var(--secondary)/0.8);
        }
        textarea:focus {
            outline: none;
            border-color: hsl(var(--primary));
            box-shadow: 0 0 0 2px hsl(var(--background)), 0 0 0 4px hsl(var(--primary)/0.5);
        }
        button {
            background-color: hsl(var(--primary));
            color: hsl(var(--primary-foreground));
            padding: 0.75rem 1.25rem;
            border-radius: 0.25rem;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 2.5rem;
            position: relative;
            overflow: hidden;
        }
        button::after {
            content: '';
            position: absolute;
            inset: 0;
            background-color: transparent;
            transition: background-color 0.15s ease;
        }
        button:hover::after {
            background-color: rgba(255, 255, 255, 0.1);
        }
        button:active::after {
            background-color: rgba(0, 0, 0, 0.1);
        }
        button:hover {
            background-color: hsl(var(--primary) / 0.8);
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background-color: hsl(var(--secondary));
            color: hsl(var(--secondary-foreground));
            cursor: not-allowed;
            transform: none;
        }
        .error {
            background-color: hsl(var(--destructive)/0.15);
            color: hsl(var(--destructive));
            border: 1px solid hsl(var(--destructive)/0.2);
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            margin-top: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="root" style="width: 100%; height: 100vh;"></div>
    <noscript>
        <div style="text-align: center; padding: 2rem;">
            <h1>JavaScript Required</h1>
            <p>Please enable JavaScript to use the Discord Bot Manager.</p>
        </div>
    </noscript>
    <script src="/bundle.js"></script>
</body>
</html>
